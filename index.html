value:2,text:"Je cherche à tester mes hypothèses positives ET négatives pour avoir un tableau équilibré."}],explanation:"Nos premières impressions agissent comme un filtre sur les informations suivantes. On remarque plus facilement ce qui confirme le jugement initial. Cette tendance s'applique aussi bien aux recrutements qu'aux décisions stratégiques ou aux relations personnelles."},{id:"q_anch_1",biasId:"anchoring",question:"Vous négociez le renouvellement d'un contrat de prestation. Avant même que vous parliez, le prestataire annonce un tarif 30 % plus élevé qu'avant. Vous avez votre propre estimation. Comment abordez-vous la suite ?",options:[{label:"A",value:1,text:"Je propose instinctivement un compromis entre son tarif et l'ancien, plutôt qu'en partant de mon estimation."},{label:"B",value:3,text:"J'avais préparé mon propre chiffre cible indépendamment ; je m'y réfère comme point d'ancrage à moi."},{label:"C",value:2,text:"Je demande une justification détaillée du nouveau tarif avant de donner toute réponse."},{label:"D",value:1,text:"Je me retrouve à raisonner à partir de son chiffre de départ, même en sachant que c'est une tactique."}],explanation:"Le premier chiffre mentionné dans une négociation agit comme une ancre cognitive puissante. Même en connaissant ce mécanisme, nous tendons à ajuster nos propositions par rapport à ce point initial. La meilleure protection est de préparer sa propre estimation avant d'être exposé à celle de l'autre."},{id:"q_anch_2",biasId:"anchoring",question:"Votre responsable vous demande d'estimer la durée d'un projet. Avant que vous répondiez, il dit : « Je pense que ça devrait tenir en six semaines. » Comment procédez-vous ?",options:[{label:"A",value:1,text:"Je me base sur cette estimation comme point de départ et j'ajuste légèrement selon ma propre analyse."},{label:"B",value:2,text:"Je demande à pouvoir revenir avec une estimation structurée avant de valider quoi que ce soit."},{label:"C",value:3,text:"J'avais déjà fait mentalement mon propre calcul ; je compare les deux sans laisser son chiffre influencer le mien."},{label:"D",value:1,text:"Je propose sept semaines, me sentant un peu coupable de dépasser son estimation."}],explanation:"Un chiffre entendu avant d'avoir terminé son propre raisonnement modifie notre estimation finale, même involontairement. La décomposition méthodique (bottom-up) réalisée avant tout ancrage externe est la stratégie la plus efficace."},{id:"q_halo_1",biasId:"halo",question:"Lors d'un séminaire, un intervenant charismatique et très bien habillé présente une thèse sur laquelle vous avez des doutes. Quelle est votre réaction spontanée ?",options:[{label:"A",value:1,text:"Je suis convaincu par sa présentation — quelqu'un d'aussi à l'aise doit maîtriser son sujet."},{label:"B",value:2,text:"J'apprécie la présentation, mais je prends note des points qui m'interrogent pour vérifier plus tard."},{label:"C",value:3,text:"Je dissocie consciemment la qualité de la prestation de la solidité du contenu."},{label:"D",value:1,text:"Je me dis que mes doutes tiennent peut-être à ma propre méconnaissance du sujet."}],explanation:"L'impression générale laissée par une personne (charisme, présentation, réputation) colore notre jugement sur la qualité de ses idées. Cet effet fonctionne dans les deux sens : une personne perçue négativement sur un trait verra ses autres qualités sous-évaluées."},{id:"q_halo_2",biasId:"halo",question:"Un collaborateur avec qui vous avez d'excellentes relations vous remet un rapport. Vous repérez une erreur méthodologique. Comment réagissez-vous ?",options:[{label:"A",value:2,text:"Je lui signale le problème, mais avec beaucoup de ménagement, me demandant si j'ai bien compris."},{label:"B",value:1,text:"Je pense que ça doit être une erreur de mise en forme ; son analyse est généralement très solide."},{label:"C",value:3,text:"Je traite cette erreur comme je le ferais pour n'importe quel autre rapport, et je la remonte clairement."},{label:"D",value:1,text:"Je m'interroge sur ma propre lecture — peut-être que je rate quelque chose que lui a bien vu."}],explanation:"La qualité de notre relation avec quelqu'un influence notre lecture de son travail. Quand on apprécie quelqu'un, on tend à minimiser ses erreurs ou à douter de notre propre jugement avant de douter du sien."},{id:"q_avail_1",biasId:"availability",question:"Après avoir lu plusieurs articles sur une fraude bancaire en ligne largement médiatisée, vous êtes invité à activer un nouveau service de paiement numérique proposé par votre banque. Comment évaluez-vous le risque ?",options:[{label:"A",value:1,text:"Je ressens une méfiance accrue et décide d'attendre avant d'activer le service."},{label:"B",value:2,text:"Je lis attentivement les conditions de sécurité avant de prendre ma décision."},{label:"C",value:3,text:"Je cherche les données réelles sur la sécurité de ce type de service, indépendamment des cas médiatisés."},{label:"D",value:1,text:"Je pense que les fraudes sont plus fréquentes qu'avant et préfère éviter ce type d'outil."}],explanation:"Les exemples facilement rappelables à l'esprit — notamment parce qu'ils ont été très médiatisés — semblent plus fréquents qu'ils ne le sont statistiquement. La couverture médiatique d'un événement ne reflète pas sa probabilité réelle."},{id:"q_avail_2",biasId:"availability",question:"Vous devez choisir un mode de transport pour un déplacement professionnel long. Une catastrophe aérienne s'est produite il y a dix jours. Que faites-vous ?",options:[{label:"A",value:1,text:"Je préfère prendre le train — même si c'est plus long, je me sens moins à l'aise à l'idée de prendre l'avion en ce moment."},{label:"B",value:3,text:"Je compare les statistiques d'accidents sur les deux modes de transport pour cette distance, sur plusieurs années."},{label:"C",value:2,text:"Je reconnais que l'actualité influence mon ressenti, mais je décide quand même en fonction du confort et du temps."},{label:"D",value:1,text:"Je pense que les avions sont moins bien contrôlés qu'avant et que le risque a réellement augmenté."}],explanation:"Un événement récent et saillant fausse notre perception de la probabilité. Juste après une catastrophe aérienne, beaucoup de gens surestiment le risque de voler, alors que statistiquement, les avions restent l'un des moyens de transport les plus sûrs par kilomètre parcouru."},{id:"q_stq_1",biasId:"statusquo",question:"Votre équipe utilise un logiciel depuis cinq ans. Une nouvelle solution, plus performante selon les tests pilotes, est proposée. La migration prendrait trois semaines. Quelle est votre position ?",options:[{label:"A",value:1,text:"Je pense que notre logiciel actuel fait très bien le travail et que les bénéfices ne justifient pas la perturbation."},{label:"B",value:2,text:"Je suis ouvert, mais je veux voir un retour d'expérience d'une autre équipe avant de décider."},{label:"C",value:3,text:"J'évalue les bénéfices concrets sur 12 mois versus le coût de la transition, sans a priori sur le résultat."},{label:"D",value:1,text:"Je m'assure de garder l'ancien logiciel en parallèle « au cas où », même si la migration est validée."}],explanation:"L'effort de changement est ressenti comme une perte, alors que les bénéfices attendus paraissent abstraits. Ce déséquilibre nous pousse à sur-pondérer les coûts de la transition et à minimiser les avantages potentiels du changement."},{id:"q_stq_2",biasId:"statusquo",question:"Votre banque principale vous coûte 18 € par mois. Une banque en ligne propose les mêmes services pour 0 €, avec de meilleures conditions. Quelle est votre démarche ?",options:[{label:"A",value:1,text:"Je me dis que changer de banque est une démarche compliquée et que ça ne vaut pas la peine pour ça."},{label:"B",value:2,text:"Je compare sérieusement les deux offres, mais je ressens une certaine hésitation à quitter une relation installée."},{label:"C",value:3,text:"J'évalue les deux offres sur des critères objectifs : coûts, services, sécurité, flexibilité."},{label:"D",value:1,text:"Je reste fidèle à ma banque — je la connais, le personnel aussi, et ça a de la valeur."}],explanation:"La situation présente bénéficie d'un avantage psychologique que les alternatives n'ont pas : elle est connue, prévisible, sans effort. Nous avons tendance à sur-estimer les inconvénients du changement et sous-estimer ce que nous perdons en restant."},{id:"q_auth_1",biasId:"authority",question:"Un consultant externe, présenté comme expert reconnu, recommande une réorganisation qui va à l'encontre de l'expérience de votre équipe terrain. Votre manager veut suivre la recommandation. Vous :",options:[{label:"A",value:1,text:"Faites confiance au consultant — c'est son domaine, il a vu bien plus d'entreprises que vous."},{label:"B",value:2,text:"Demandez à votre manager que l'équipe puisse présenter ses retours avant la décision finale."},{label:"C",value:3,text:"Proposez une confrontation structurée : recommandation du consultant vs analyse de l'équipe, avec des critères explicites d'arbitrage."},{label:"D",value:1,text:"Supposez que votre équipe manque peut-être de recul et qu'un regard extérieur voit des choses que vous ne voyez pas."}],explanation:"L'expertise légitime est précieuse, mais elle ne remplace pas la connaissance du contexte spécifique. La déférence automatique à une figure d'autorité — sans confronter son analyse à la réalité terrain — peut mener à des décisions inadaptées."},{id:"q_auth_2",biasId:"authority",question:"Un médecin vous prescrit un traitement. Vous avez lu des témoignages en ligne qui suggèrent des effets secondaires fréquents. Comment réagissez-vous ?",options:[{label:"A",value:1,text:"Je suis la prescription sans poser de question — c'est le médecin qui sait."},{label:"B",value:2,text:"J'en parle avec le médecin lors de la consultation suivante, mais je commence quand même le traitement."},{label:"C",value:3,text:"Je pose des questions au médecin dès la consultation : probabilité des effets secondaires, alternatives possibles, critères de réévaluation."},{label:"D",value:1,text:"Je fais confiance au médecin mais je lis quand même le témoignage d'une infirmière sur un forum, que je considère comme crédible."}],explanation:"L'autorité médicale est fondée, mais le dialogue avec le professionnel de santé est essentiel. Faire confiance à une autorité ne signifie pas s'interdire de poser des questions — c'est même ce qu'un professionnel de santé compétent attend de ses patients."},{id:"q_conf2_1",biasId:"conformity",question:"En réunion, vous avez préparé une analyse qui contredit le consensus qui se dessine. Quatre collègues semblent déjà d'accord entre eux. Que faites-vous ?",options:[{label:"A",value:1,text:"Je ne dis rien — quatre personnes ne peuvent pas toutes se tromper, je dois manquer quelque chose."},{label:"B",value:2,text:"Je pose une question ouverte pour comprendre leur raisonnement avant de prendre position."},{label:"C",value:3,text:"Je présente mon analyse même si elle est minoritaire, en l'appuyant sur mes données."},{label:"D",value:1,text:"Je défends une position légèrement différente de la leur, sans aller jusqu'à contredire franchement le groupe."}],explanation:"La pression sociale du groupe est un mécanisme puissant. Exprimer un désaccord face à une majorité demande un effort cognitif et émotionnel réel. Pourtant, les groupes homogènes prennent souvent de moins bonnes décisions que les groupes où des voix dissidentes s'expriment."},{id:"q_conf2_2",biasId:"conformity",question:"Vous êtes sur le point d'écrire un avis négatif sur un restaurant que vous avez trouvé décevant. Vous remarquez qu'il a 4,6 étoiles sur 400 avis. Que faites-vous ?",options:[{label:"A",value:1,text:"Je révise légèrement mon évaluation à la hausse — peut-être que j'ai eu une mauvaise expérience isolée."},{label:"B",value:2,text:"J'essaie de comprendre ce que les autres ont aimé que je n'ai pas apprécié, et j'adapte mon avis en conséquence."},{label:"C",value:3,text:"J'écris mon avis en me basant uniquement sur ma propre expérience, quelle que soit la note globale."},{label:"D",value:1,text:"Je m'abstiens — il y a sûrement quelque chose que je n'ai pas compris si tant de gens sont satisfaits."}],explanation:"La note collective agit comme une ancre sociale qui modifie rétrospectivement notre propre évaluation. Ce phénomène explique notamment la polarisation des avis en ligne : les opinions tendent à rejoindre le consensus perçu."},{id:"q_opt_1",biasId:"optimism",question:"Vous planifiez un projet ambitieux. Une estimation rigoureuse donne 5 mois, mais votre direction attend 3 mois. Que faites-vous ?",options:[{label:"A",value:1,text:"Je m'engage sur 3 mois — notre équipe est efficace et je veux rester compétitif."},{label:"B",value:2,text:"Je propose 4 mois comme compromis en espérant que l'équipe tient ce délai."},{label:"C",value:3,text:"Je présente mon estimation de 5 mois avec une ventilation par phase et une analyse des risques, même si c'est inconfortable."},{label:"D",value:1,text:"Je pense que l'estimation de 5 mois inclut des marges excessives et que nous pouvons faire mieux."}],explanation:"Le biais d'optimisme nous pousse à sous-estimer la durée et les ressources nécessaires — c'est la « loi de Hofstadter ». Les projets prennent presque toujours plus de temps que prévu, y compris en tenant compte de cette loi."},{id:"q_opt_2",biasId:"optimism",question:"Vous envisagez de lancer une activité indépendante. Les statistiques montrent que 60 % des nouvelles entreprises ferment dans les 5 premières années. Quelle est votre réaction à cette donnée ?",options:[{label:"A",value:1,text:"Je pense que ces statistiques concernent des gens moins préparés que moi ou sur des marchés différents."},{label:"B",value:2,text:"Je prends la statistique au sérieux et je renforce mon business plan pour l'intégrer dans mon analyse de risque."},{label:"C",value:3,text:"J'utilise ce taux comme référence de base et j'analyse systématiquement quels facteurs d'échec s'appliquent à mon cas."},{label:"D",value:1,text:"Je suis confiant — les gens qui réussissent n'ont pas arrêté parce que les statistiques étaient défavorables."}],explanation:"Le biais d'optimisme nous conduit à croire que nous sommes moins exposés aux risques que la moyenne. Kahneman et Lovallo appellent cela le « planning fallacy » : nous raisonnons à partir de notre cas (inside view) en ignorant les données statistiques disponibles (outside view)."},{id:"q_neg_1",biasId:"negativity",question:"À l'issue d'une présentation, vous recevez 12 retours : 10 positifs et 2 critiques. Le soir, quelle est votre pensée dominante ?",options:[{label:"A",value:1,text:"Je repasse mentalement les deux critiques, me demandant ce que j'aurais dû faire différemment."},{label:"B",value:2,text:"Je note les critiques pour progresser, mais j'ai globalement un sentiment positif de la séance."},{label:"C",value:3,text:"Je traite les 12 retours à proportion : 83 % de positif, c'est un bon résultat ; les critiques sont des pistes d'amélioration."},{label:"D",value:1,text:"Je me demande si les 10 retours positifs étaient sincères ou juste de la politesse."}],explanation:"Les informations négatives ont un impact psychologique plus fort que les informations positives de même intensité. Ce mécanisme a une valeur adaptative — être attentif aux menaces — mais dans un contexte professionnel, il peut conduire à un découragement disproportionné."},{id:"q_neg_2",biasId:"negativity",question:"En début de semaine, vous lisez une série d'articles alarmants sur votre secteur professionnel. Comment cela influence-t-il votre perception de votre propre situation ?",options:[{label:"A",value:1,text:"Je commence à m'inquiéter pour mon poste, même si ma situation personnelle n'a pas changé."},{label:"B",value:2,text:"Je reconnais que l'actualité génère un sentiment négatif, mais j'essaie de ne pas généraliser à ma situation."},{label:"C",value:3,text:"Je contextualise : l'actualité médiatise les difficultés, pas les réussites ; je vais chercher des données de fond sur mon secteur."},{label:"D",value:1,text:"Je commence à explorer d'autres pistes professionnelles par précaution, même sans signal concret dans mon entreprise."}],explanation:"Les médias couvrent davantage les événements négatifs que positifs, ce qui crée une perception biaisée de la réalité. Faire la distinction entre la couverture médiatique d'une tendance et la réalité vécue est un exercice de pensée critique essentiel."},{id:"q_dk_1",biasId:"dunningkruger",question:"Vous venez de suivre une formation de deux jours sur la gestion de projet. Un collègue vous demande votre avis sur un problème complexe dans un projet que vous n'avez pas suivi. Que répondez-vous ?",options:[{label:"A",value:1,text:"Je donne mon analyse — la formation m'a donné les outils pour évaluer ce type de situation."},{label:"B",value:2,text:"Je partage quelques pistes issues de la formation, en précisant que je manque de contexte sur ce projet."},{label:"C",value:3,text:"Je distingue clairement ce que la formation m'a apporté de ce que je ne maîtrise pas encore, et je l'exprime."},{label:"D",value:1,text:"Je me sens suffisamment équipé pour répondre — deux jours de formation intensive, c'est solide."}],explanation:"Les connaissances partielles créent souvent une confiance excessive, car elles ne permettent pas encore de mesurer l'étendue de ce qu'on ne sait pas. Kruger et Dunning ont montré que les personnes peu expérimentées dans un domaine surestiment systématiquement leur niveau."},{id:"q_dk_2",biasId:"dunningkruger",question:"Vous animez votre première réunion de management. Elle se passe plutôt bien. Quelle est votre évaluation de vos capacités de manager à l'issue ?",options:[{label:"A",value:1,text:"Je me sens naturellement à l'aise dans ce rôle — le management n'est finalement pas si complexe."},{label:"B",value:2,text:"C'est encourageant, mais je reconnais avoir encore beaucoup à apprendre sur la durée."},{label:"C",value:3,text:"Je réalise un bilan structuré de ce que j'ai bien géré et des aspects qui dépassent encore mon niveau."},{label:"D",value:1,text:"Je pense avoir les qualités humaines pour ce rôle ; les compétences techniques, ça vient avec la pratique."}],explanation:"Le management est l'une des disciplines où l'effet Dunning-Kruger se manifeste le plus clairement. Une seule expérience positive ne révèle pas les limites réelles de la compétence — elle cache souvent ce qu'on n'a pas encore eu à affronter."},{id:"q_fram_1",biasId:"framing",question:"Votre médecin vous présente deux options chirurgicales : « L'opération A a un taux de survie de 92 % » ; « L'opération B présente un risque de mortalité de 8 % ». Quelle est votre réaction ?",options:[{label:"A",value:1,text:"L'opération A me semble clairement plus rassurante, même si je réalise que c'est la même statistique."},{label:"B",value:2,text:"Je demande des informations complémentaires : effets secondaires, récupération, taux de complications."},{label:"C",value:3,text:"Je reformule les deux options dans les mêmes termes pour neutraliser l'effet de la présentation."},{label:"D",value:1,text:"Je ne m'en rends pas compte sur le moment, mais l'option A m'influence davantage dans ma décision."}],explanation:"La même information présentée différemment génère des préférences différentes. Kahneman et Tversky ont montré que nous réagissons différemment à « 92 % de survie » et à « 8 % de mortalité », bien que ces formulations soient mathématiquement identiques."},{id:"q_fram_2",biasId:"framing",question:"Un produit alimentaire est étiqueté « 90 % sans matière grasse ». Un produit concurrent mentionne qu'il « contient 10 % de matière grasse ». Comment évaluez-vous ces deux produits ?",options:[{label:"A",value:1,text:"Le premier me semble meilleur pour la santé — la formulation positive est plus claire."},{label:"B",value:2,text:"Je consulte les valeurs nutritionnelles détaillées pour comparer réellement les deux."},{label:"C",value:3,text:"Je traduis mentalement les deux étiquettes dans la même unité pour les comparer à iso-information."},{label:"D",value:1,text:"Je ne perçois pas vraiment de différence entre les deux formulations au premier coup d'œil."}],explanation:"Le cadrage positif (« 90 % sans matière grasse ») génère une perception plus favorable que le cadrage négatif (« 10 % de matière grasse ») pour la même réalité. Ce mécanisme est largement exploité dans le marketing alimentaire et pharmaceutique."},{id:"q_hind_1",biasId:"hindsight",question:"Un projet que vous avez soutenu échoue malgré des mois d'efforts. En faisant le bilan, quelle est votre lecture ?",options:[{label:"A",value:1,text:"Je me dis que les signaux d'alerte étaient visibles dès le début — on aurait dû les voir."},{label:"B",value:2,text:"J'analyse les décisions clés pour comprendre ce qui aurait pu être fait différemment."},{label:"C",value:3,text:"Je reconstitue l'information disponible à chaque étape pour évaluer si les décisions étaient raisonnables dans leur contexte."},{label:"D",value:1,text:"Je pense que la plupart des problèmes étaient prévisibles par quelqu'un avec suffisamment d'expérience."}],explanation:"Une fois un événement survenu, il nous semble avoir été prévisible — c'est l'illusion rétrospective. Ce biais déforme notre mémoire de ce que nous savions avant l'événement, ce qui rend difficile l'apprentissage réel à partir des échecs."},{id:"q_hind_2",biasId:"hindsight",question:"Six mois plus tôt, vous aviez prédit qu'un concurrent lancerait un nouveau produit sur votre marché. C'est arrivé. Comment interprétez-vous cette réussite ?",options:[{label:"A",value:1,text:"Je me sens conforté dans la qualité de mon analyse — c'était clairement visible pour qui regardait les bons signaux."},{label:"B",value:2,text:"Je note le succès de la prédiction, mais j'identifie aussi les éléments que je n'avais pas anticipés."},{label:"C",value:3,text:"J'examine ce que j'avais réellement comme donnée nce à rechercher, interpréter, mémoriser et rappeler les informations d'une manière qui confirme nos croyances ou hypothèses préexistantes, tout en accordant moins d'attention aux informations qui les contredisent. C'est l'un des biais cognitifs les plus documentés en psychologie.",howItWorks:"Ce biais opère à plusieurs niveaux : lors de la recherche d'information (on consulte les sources qui partagent notre vision), lors de l'interprétation (on lit les données ambiguës comme confirmant notre position) et lors de la mémorisation (on retient plus facilement ce qui valide nos croyances). Il découle de notre tendance naturelle à réduire la dissonance cognitive.",origin:"Le terme a été introduit par le psychologue Peter Wason dans les années 1960 à travers sa célèbre expérience « 2-4-6 ». Les travaux de Daniel Kahneman et Amos Tversky ont ensuite approfondi sa compréhension dans le cadre de la théorie des heuristiques et des biais cognitifs.",dailyExamples:["Lire uniquement les médias dont on partage l'opinion politique.","Chercher des avis clients qui confirment qu'un produit est bon avant de l'acheter.","Interpréter l'humeur de son partenaire comme preuve de conflit imminent quand on est inquiet."],professionalExamples:["Un manager convaincu qu'un collaborateur est peu performant ne remarque que ses erreurs, ignorant ses réussites.","Un investisseur sûr d'une stratégie ne lit que les analyses qui la soutiennent.","Un recruteur favorise les candidats qui confirment son intuition initiale."],impacts:["Prises de décision biaisées basées sur des informations incomplètes.","Polarisation des opinions dans les groupes et les équipes.","Résistance au changement et à l'apprentissage."],misconceptions:["Idée reçue : « Je suis rationnel, donc je ne suis pas concerné. » — En réalité, plus on est expert, plus on peut être sujet à ce biais.","Idée reçue : « Il suffit d'avoir accès à l'information. » — L'accès ne suffit pas ; c'est notre traitement de l'information qui est biaisé."],howToReduce:["Formuler activement l'hypothèse inverse de celle qu'on soutient.","Chercher délibérément des arguments contredisant votre position (steel-manning).","Consulter des sources diverses, y compris celles avec lesquelles on est en désaccord.","Dans les équipes, nommer un « avocat du diable »."],resources:["Kahneman, D. (2011). Thinking, Fast and Slow. Farrar, Straus and Giroux.","Nickerson, R. S. (1998). Confirmation bias. Review of General Psychology, 2(2), 175–220.","Wason, P. C. (1960). On the failure to eliminate hypotheses. Quarterly Journal of Experimental Psychology, 12(3)."],trainer:{objectives:["Faire prendre conscience de la sélectivité naturelle de notre attention.","Identifier des situations professionnelles concrètes où ce biais opère.","Expérimenter des stratégies de contre-biais applicables immédiatement."],icebreakers:["« Pensez à la dernière fois que vous avez changé radicalement d'avis. Qu'est-ce qui vous y a aidé ? » (2 min par paires)","Distribuer un texte ambigu sur un sujet polarisant et demander à chaque groupe d'en résumer le sens."],situations:["Mise en situation : « Vous évaluez un collaborateur dont vous pensez qu'il manque de rigueur. Listez 5 preuves... puis listez 5 contre-preuves. »","Jeu de rôle : un manager doit recruter entre deux candidats avec des profils opposés."],exercises:["Exercice 1-3-9 : seul → en trio → en groupe complet. Chaque niveau ajoute une couche de contradiction.","Analyse de cas : présenter un vrai échec d'entreprise lié au biais de confirmation (ex. Kodak et le numérique)."],debrief:["Comment avez-vous sélectionné vos informations ?","Quand avez-vous ressenti un inconfort ? Pourquoi ?","Quelle stratégie pourriez-vous mettre en place dès demain ?"],commonErrors:["Confondre biais de confirmation et simple manque d'information.","Penser qu'une formation suffit à éliminer le biais (il peut seulement être atténué)."],facilitationTips:["Éviter de donner son opinion personnelle sur les exemples politiques ou sociaux.","Ancrer toujours dans le concret professionnel, pas dans l'abstrait."],debateQuestions:["Peut-on prendre de bonnes décisions en sachant qu'on est soumis à ce biais ?","Les réseaux sociaux amplifient-ils le biais de confirmation ?","Quel rôle joue le manager dans la création d'une culture qui challenge ce biais ?"],reflectionPaths:["Comment mon organisation prend-elle en compte les avis contraires ?","Quels processus favorisent ou freinent la remise en question ?"],businessApplications:["Recrutement : diversifier les panels et structurer les entretiens.","Stratégie : instaurer des revues stratégiques avec des perspectives externes.","Management : former les managers à la rétroaction équilibrée."]}},{id:"anchoring",name:"Biais d'ancrage",shortDef:"Influence excessive d'une première information sur nos jugements.",icon:"⚓",color:"#7C3AED",definition:"Le biais d'ancrage décrit notre tendance à accorder un poids disproportionné à la première information reçue (l'ancre) lorsque nous formulons des jugements ou prenons des décisions. Même lorsque l'ancre est manifestement arbitraire ou non pertinente, elle continue d'influencer nos estimations de manière significative.",howItWorks:"Kahneman et Tversky ont démontré que les individus ajustent leurs estimations à partir d'une valeur initiale en la modifiant insuffisamment. Ce phénomène résulte de notre tendance à ne générer que les informations compatibles avec l'ancre. Plus l'ancre est extrême, plus l'estimation finale s'en éloigne, mais reste néanmoins influencée.",origin:"Identifié et nommé par Amos Tversky et Daniel Kahneman en 1974, dans leur article fondateur sur les heuristiques et les biais cognitifs. Ils ont notamment réalisé l'expérience de la roue de la fortune pour démontrer l'effet d'ancres arbitraires.",dailyExamples:["Le prix barré sur une étiquette : 99€ au lieu de 150€ crée l'impression d'une bonne affaire.","Une première note obtenue dans une matière influence toutes les suivantes.","Le premier salaire d'une carrière influence les négociations futures."],professionalExamples:["En négociation commerciale, la première offre posée structure toute la suite de la discussion.","Un budget initial (même provisoire) tend à contraindre le budget final.","Un expert évalue différemment une propriété selon le prix de vente demandé."],impacts:["Négociations déséquilibrées au profit de celui qui pose l'ancre en premier.","Évaluations de performance faussées par les résultats antérieurs.","Mauvaises estimations de délais et de coûts dans les projets."],misconceptions:["Idée reçue : « Seules les ancres crédibles ont un effet. » — Des ancres arbitraires influencent aussi les estimations.","Idée reçue : « Les experts y sont moins sensibles. » — Des études montrent que les experts sont souvent tout aussi sensibles."],howToReduce:["Générer sa propre estimation avant d'être exposé à une ancre externe.","En négociation, considérer plusieurs scénarios indépendants avant de répondre.","Adopter une méthode d'estimation structurée (planification par référence de classe).","Prendre conscience de l'ancre en la nommant explicitement dans le groupe."],resources:["Tversky, A., & Kahneman, D. (1974). Judgment under uncertainty: Heuristics and biases. Science, 185(4157), 1124–1131.","Ariely, D. (2008). Predictably Irrational. HarperCollins.","Mussweiler, T., & Strack, F. (2001). The semantics of anchoring. Organizational Behavior and Human Decision Processes, 86(2)."],trainer:{objectives:["Expérimenter concrètement l'effet d'une ancre numérique.","Identifier les situations professionnelles à risque d'ancrage.","Acquérir des stratégies de protection en négociation."],icebreakers:["Exercice classique : demander d'estimer si Gandhi est mort avant ou après 9 ans (puis 140 ans) selon les groupes. Observer l'écart des estimations.","Présenter deux produits identiques avec des prix barrés différents et demander lequel paraît plus avantageux."],situations:["Simulation de négociation salariale : un groupe pose une ancre haute, l'autre une ancre basse. Comparer les résultats.","Estimation d'un budget projet : chaque sous-groupe reçoit un budget « indicatif » différent."],exercises:["Estimer 5 grandeurs (distances, dates, populations) avant et après avoir vu une ancre arbitraire.","Jeu de rôle de négociation avec rôles d'acheteur et vendeur."],debrief:["Comment avez-vous réagi à la première information reçue ?","Avez-vous ressenti une résistance à vous en éloigner ?","Dans votre métier, quels sont les ancrages qui structurent vos décisions ?"],commonErrors:["Croire que nommer l'ancre suffit à en neutraliser l'effet.","Se concentrer uniquement sur les ancres numériques (les ancres conceptuelles sont tout aussi puissantes)."],facilitationTips:["Utiliser des données réelles du secteur pour rendre les exercices plus percutants.","Laisser les groupes découvrir l'effet eux-mêmes."],debateQuestions:["Est-il éthique d'utiliser délibérément les ancres en négociation ?","Comment structurer un processus décisionnel pour réduire l'ancrage collectif ?"],reflectionPaths:["Quelles ancres structurent actuellement vos projets en cours ?","Comment votre organisation établit-elle ses objectifs annuels ?"],businessApplications:["Négociation : former les équipes commerciales à poser des ancres favorables.","Gestion de projet : estimations bottom-up plutôt que top-down.","RH : structurer les grilles salariales pour limiter l'effet d'ancrage."]}},{id:"halo",name:"Effet de halo",shortDef:"Une impression globale positive ou négative colore tous nos jugements.",icon:"✨",color:"#D97706",definition:"L'effet de halo est un biais cognitif par lequel l'impression générale que l'on a d'une personne, d'une marque ou d'une situation influence la manière dont on évalue ses caractéristiques spécifiques. Une personne perçue comme charismatique sera supposée compétente, honnête et intelligente, même sans preuves directes.",howItWorks:"Notre cerveau cherche à maintenir une cohérence interne dans ses jugements. Quand une première impression positive est formée, elle crée un « halo » qui teinte les évaluations ultérieures. L'effet inverse — l'effet de corne — opère de la même façon mais dans un sens négatif.",origin:"Décrit pour la première fois par le psychologue Edward Thorndike en 1920, dans une étude sur l'évaluation des soldats par leurs officiers. Il a ensuite été étudié extensivement dans le domaine de l'évaluation professionnelle et du marketing.",dailyExamples:["Une personne physiquement attractive est souvent perçue comme plus intelligente.","Un produit d'une marque de luxe est jugé de meilleure qualité, même sans tests objectifs.","Un premier cours brillant d'un enseignant crée une disposition favorable pour tous les suivants."],professionalExamples:["Un recruteur impressionné par le diplôme d'un candidat tend à surnoter toutes ses compétences.","Un client satisfait d'un premier projet attribue automatiquement la réussite du second à l'agence.","L'évaluation annuelle d'un collaborateur est influencée par son dernier résultat marquant."],impacts:["Évaluations professionnelles biaisées, favorisant les personnes charismatiques.","Décisions de recrutement fondées sur des critères superficiels.","Relations commerciales basées sur la réputation plutôt que sur les faits."],misconceptions:["Idée reçue : « Les RH professionnels n'y sont pas soumis. » — Des études montrent que même les évaluateurs formés restent influencés.","Idée reçue : « L'effet de halo ne concerne que les personnes. » — Il s'applique aussi aux marques, aux organisations et aux idées."],howToReduce:["Structurer les évaluations par critères indépendants, évalués séparément.","Utiliser des grilles d'évaluation standardisées avant d'avoir une vision globale.","Anonymiser les candidatures lors du tri initial.","Former les évaluateurs à identifier leurs premières impressions."],resources:["Thorndike, E. L. (1920). A constant error in psychological ratings. Journal of Applied Psychology, 4(1), 25–29.","Nisbett, R. E., & Wilson, T. D. (1977). The halo effect. Journal of Personality and Social Psychology, 35(4).","Rosenzweig, P. (2007). The Halo Effect. Free Press."],trainer:{objectives:["Identifier l'influence des premières impressions sur les jugements professionnels.","Concevoir des processus d'évaluation plus équitables.","Distinguer l'effet de halo de l'effet de corne."],icebreakers:["Montrer les photos de deux candidats fictifs et demander au groupe d'évaluer leur compétence probable.","Lire deux descriptions identiques d'un employé avec des présentations différentes."],situations:["Simulation d'entretien : un candidat très souriant pour un poste d'analyste.","Étude de cas : une marque connue lance un produit médiocre — comment le marché réagit-il ?"],exercises:["Évaluation croisée : évaluer le même projet sans connaître l'auteur, puis en le connaissant.","Construire une grille d'évaluation par compétences pour un poste cible."],debrief:["Quelle première impression avez-vous eue ? Sur quoi était-elle fondée ?","Comment avez-vous géré la dissonance lorsque les faits contredisaient votre impression ?"],commonErrors:["Confondre l'effet de halo avec un biais de sympathie (le halo peut être négatif).","Penser qu'une grille suffit — il faut aussi former à son utilisation rigoureuse."],facilitationTips:["Utiliser des exemples tirés du secteur d'activité des participants.","Ne pas confondre l'effet de halo et la discrimination."],debateQuestions:["La marque employeur peut-elle créer un halo positif qui biaise les recrutements ?","Peut-on former quelqu'un à être « plus attractif » sans que ce soit une manipulation ?"],reflectionPaths:["Qui dans mon équipe bénéficie ou pâtit d'un halo ? Pourquoi ?"],businessApplications:["Recrutement : structured interviewing, blind CV screening.","Management : entretiens annuels structurés par compétences.","Marketing : comprendre comment la réputation de marque influence les perceptions produit."]}},{id:"availability",name:"Biais de disponibilité",shortDef:"On surestime la probabilité de ce qui nous vient facilement à l'esprit.",icon:"🧠",color:"#059669",definition:"Le biais de disponibilité est une heuristique par laquelle nous évaluons la probabilité d'un événement en fonction de la facilité avec laquelle des exemples nous viennent à l'esprit. Plus un exemple est facile à rappeler — parce qu'il est récent, émotionnellement marquant ou médiatisé —, plus nous surestimerons sa fréquence ou sa probabilité.",howItWorks:"Notre cerveau utilise la facilité de rappel comme raccourci pour estimer la probabilité. Les événements dramatiques, récents ou personnellement vécus laissent des traces mémoriales plus accessibles. Cette heuristique est utile dans la vie quotidienne mais conduit à des distorsions dans l'évaluation des risques.",origin:"Décrit par Tversky et Kahneman en 1973. L'une des démonstrations les plus célèbres : les participants surestiment largement la fréquence des décès par accidents d'avion par rapport aux accidents de voiture, car les crashs aériens sont plus médiatisés.",dailyExamples:["Après avoir vu un accident de voiture, on se sent plus prudent au volant pendant quelques jours.","On surestime le risque d'attaque de requin (très médiatisée) par rapport à d'autres dangers bien plus courants.","On pense qu'un collègue fait souvent des erreurs après qu'il en a commis une récente et visible."],professionalExamples:["Un manager surpondère un risque projet parce qu'un projet similaire a échoué récemment.","Un médecin peut surestimer la probabilité d'une maladie rare qu'il a récemment diagnostiquée.","Les décisions post-crise sont souvent sur-calibrées par rapport à la crise précédente."],impacts:["Mauvaise évaluation des risques (sous-estimation des risques silencieux, surestimation des risques dramatiques).","Allocations de ressources déséquilibrées en gestion de crise.","Politiques publiques réactives plutôt que préventives."],misconceptions:["Idée reçue : « Si c'est facile à imaginer, c'est probable. » — La facilité d'imagination ne reflète pas la réalité statistique.","Idée reçue : « Les experts en statistiques y échappent. » — Ce biais affecte aussi les professionnels entraînés."],howToReduce:["Consulter les données statistiques objectives avant d'évaluer un risque.","Distinguer l'émotion suscitée par un exemple de sa fréquence réelle.","Utiliser des bases de référence et des taux de base dans les décisions."],resources:["Tversky, A., & Kahneman, D. (1973). Availability: A heuristic for judging frequency and probability. Cognitive Psychology, 5(2), 207–232.","Slovic, P. (2000). The Perception of Risk. Earthscan.","Kahneman, D. (2011). Thinking, Fast and Slow."],trainer:{objectives:["Distinguer probabilité subjective et probabilité objective.","Identifier l'influence des médias et des expériences récentes sur les perceptions de risque.","Introduire des outils d'évaluation des risques plus rigoureux."],icebreakers:["Quiz : quelle cause de décès est la plus fréquente en France ? Comparer les réponses aux données réelles.","Demander au groupe de citer rapidement 10 marques de voitures, puis 10 légumes."],situations:["Analyse d'une décision de gestion de crise suite à un incident médiatisé.","Cas d'une équipe qui surestime un type de risque projet après un échec récent."],exercises:["Cartographie des risques : identifier les risques perçus vs. les risques réels avec données.","Exercice de désancrage émotionnel après une nouvelle anxiogène."],debrief:["Quelle information avait le plus de poids dans votre évaluation ? Était-elle statistiquement représentative ?"],commonErrors:["Confondre biais de disponibilité et biais de récence."],facilitationTips:["Utiliser des données sectorielles réelles pour ancrer la discussion."],debateQuestions:["Les médias ont-ils une responsabilité dans l'amplification de ce biais ?","Comment un manager peut-il équilibrer l'urgence perçue et l'urgence réelle ?"],reflectionPaths:["Quels risques dans mon organisation sont sur- ou sous-estimés par rapport à leur fréquence réelle ?"],businessApplications:["Gestion des risques : matrices de probabilité x impact basées sur des données historiques.","Veille : distinguer les tendances réelles des phénomènes médiatisés."]}},{id:"statusquo",name:"Biais de statu quo",shortDef:"Préférence pour l'état actuel des choses, résistance au changement.",icon:"⚖️",color:"#DC2626",definition:"Le biais de statu quo est notre tendance à préférer l'état actuel des choses et à percevoir tout changement comme une perte potentielle. Même lorsqu'une alternative serait objectivement meilleure, nous avons tendance à rester dans la situation existante par défaut, en surestimant le coût du changement.",howItWorks:"Ce biais découle de l'aversion à la perte (loss aversion) décrite par Kahneman et Tversky : les pertes ont psychologiquement plus de poids que les gains équivalents. Le statu quo devient ainsi une référence par rapport à laquelle toute modification est évaluée comme une perte potentielle.",origin:"Conceptualisé par Samuelson et Zeckhauser en 1988, ce biais a été démontré dans de nombreux domaines : choix de retraite, préférences politiques, décisions médicales, consommation.",dailyExamples:["Rester abonné à un service que l'on n'utilise plus parce que résilier demande un effort.","Choisir le même plat au restaurant parce qu'on « sait que c'est bon ».","Continuer à utiliser un logiciel obsolète pour éviter de changer ses habitudes."],professionalExamples:["Une organisation maintient un processus inefficace parce qu'il est familier.","Des employés résistent à un nouvel outil de gestion performant.","Un dirigeant maintient une stratégie dépassée par peur des risques du changement."],impacts:["Frein à l'innovation et à la transformation organisationnelle.","Maintien de pratiques sous-optimales ou obsolètes.","Résistances au changement coûteuses pour les projets de transformation."],misconceptions:["Idée reçue : « La résistance au changement, c'est de la mauvaise volonté. » — C'est souvent un biais cognitif naturel.","Idée reçue : « Il suffit de montrer les bénéfices. » — L'aversion à la perte est plus forte que l'attrait du gain, même démontré."],howToReduce:["Reformuler la décision en termes de coût de l'inaction plutôt que de coût du changement.","Rendre les alternatives plus concrètes et moins abstraites.","Proposer des transitions progressives plutôt que des ruptures brutales."],resources:["Samuelson, W., & Zeckhauser, R. (1988). Status quo bias in decision making. Journal of Risk and Uncertainty, 1(1), 7–59.","Kahneman, D., et al. (1991). The endowment effect, loss aversion, and status quo bias. Journal of Economic Perspectives.","Thaler, R. H., & Sunstein, C. R. (2008). Nudge. Yale University Press."],trainer:{objectives:["Comprendre les mécanismes psychologiques de la résistance au changement.","Distinguer résistance rationnelle et biais de statu quo.","Identifier des leviers de transformation adaptés."],icebreakers:["Demander au groupe de choisir entre leur siège actuel et un autre siège identique. Observer la préférence pour rester.","Quiz : proposer un jeu où les gains potentiels nécessitent de quitter une position sûre."],situations:["Scénario : un nouveau logiciel CRM remplace l'ancien. Comment gérer les résistances ?","Cas d'une réorganisation d'équipe."],exercises:["Cartographie des forces : distinguer les freins liés au biais de ceux liés à des objections légitimes.","Réécriture : reformuler une proposition de changement pour en réduire la perception de perte."],debrief:["Quelles objections étaient fondées sur des faits ? Lesquelles sur le confort de l'existant ?"],commonErrors:["Qualifier systématiquement de « biais » toute résistance sans écouter les objections légitimes.","Forcer le changement sans accompagnement."],facilitationTips:["Valider le sentiment de perte avant de présenter les gains.","Utiliser le storytelling pour incarner le changement."],debateQuestions:["Toute résistance au changement est-elle un biais ?","Comment créer une culture qui rend le changement plus naturel ?"],reflectionPaths:["Quel changement dans mon environnement professionnel suis-je en train de retarder ?"],businessApplications:["Change management : plans de transition progressifs.","Produit : onboarding qui réduit le coût perçu du changement.","Leadership : distinguer résistance légitime et biais de statu quo."]}},{id:"authority",name:"Biais d'autorité",shortDef:"Tendance à accorder plus de crédit à une opinion en raison du statut de son auteur.",icon:"🎓",color:"#0891B2",definition:"Le biais d'autorité est notre tendance à accorder plus de poids à l'opinion d'une personne perçue comme une autorité — en raison de son titre, de son statut, de son diplôme ou de sa réputation — sans évaluer la valeur intrinsèque de son argument.",howItWorks:"La déférence à l'autorité est un mécanisme d'apprentissage social efficace dans la plupart des cas. Mais ce raccourci devient problématique lorsqu'il s'applique en dehors du domaine d'expertise de l'autorité, ou lorsqu'il inhibe l'esprit critique. Les expériences de Milgram ont illustré de façon extrême le pouvoir de l'autorité.",origin:"Étudié notamment à travers les célèbres expériences d'obéissance de Stanley Milgram (1963). Robert Cialdini en a fait l'un de ses six principes de persuasion dans « Influence » (1984).",dailyExamples:["Suivre un conseil médical sans chercher à comprendre son fondement.","Acheter un produit recommandé par une célébrité même sans rapport avec son domaine.","Accepter une affirmation d'un supérieur hiérarchique sans la questionner."],professionalExamples:["Un consultant externe est écouté sur des sujets que les collaborateurs internes maîtrisent mieux.","Un dirigeant issu d'une grande école voit ses décisions moins challengées.","Un médecin senior fait moins face à des désaccords même hors de sa spécialité."],impacts:["Réduction de la pensée critique dans les équipes.","Erreurs non détectées car personne n'ose contredire l'autorité.","Manipulation facilitée par les titres ou les apparences d'autorité."],misconceptions:["Idée reçue : « Faire confiance aux experts, c'est raisonnable. » — Oui, dans leur domaine. Le biais opère quand la déférence est excessive ou hors domaine.","Idée reçue : « Ce biais disparaît avec l'expérience. » — Des cadres expérimentés y sont tout aussi soumis."],howToReduce:["Développer une culture du questionnement respectueux.","Évaluer les arguments plutôt que les sources.","Présenter les idées anonymement avant discussion dans les équipes.","Former les managers à valoriser les désaccords constructifs."],resources:["Milgram, S. (1963). Behavioral study of obedience. Journal of Abnormal and Social Psychology, 67(4).","Cialdini, R. B. (1984). Influence: The Psychology of Persuasion. HarperCollins.","Edmondson, A. (1999). Psychological safety and learning behavior in work teams. Administrative Science Quarterly, 44(2)."],trainer:{objectives:["Comprendre les mécanismes de déférence à l'autorité.","Développer un questionnement critique respectueux.","Identifier les conditions organisationnelles qui amplifient ce biais."],icebreakers:["Présenter une affirmation fausse attribuée à une autorité reconnue. Observer les réactions.","Jeu : un participant en blouse blanche donne des instructions absurdes."],situations:["Scénario : un expert externe recommande une décision qui contredit l'avis de l'équipe interne.","Cas : erreur médicale ou aéronautique due à une déférence excessive."],exercises:["Débat avec distribution aléatoire des rôles.","Analyse d'un discours d'autorité : arguments de fond vs. arguments d'autorité."],debrief:["Quand avez-vous retenu une objection par peur de paraître incompétent ?","Quelles conditions permettent dans votre contexte de challenger une autorité ?"],commonErrors:["Confondre biais d'autorité et respect légitime de l'expertise.","Encourager un scepticisme systématique qui déstabilise la confiance."],facilitationTips:["Créer un espace de sécurité psychologique.","Citer des exemples de catastrophes (Challenger) pour illustrer les enjeux."],debateQuestions:["Comment concilier hiérarchie fonctionnelle et esprit critique ?","La sécurité psychologique en équipe est-elle compatible avec certaines cultures d'entreprise ?"],reflectionPaths:["Dans mon équipe, qui a le droit de se tromper ? Qui n'a pas le droit d'avoir tort ?"],businessApplications:["Leadership : former les dirigeants à solliciter activement les désaccords.","Sécurité : cultures fondées sur la remise en question des autorités (aviation, médecine).","Innovation : espaces de sécurité psychologique pour l'expérimentation."]}},{id:"conformity",name:"Biais de conformité",shortDef:"Tendance à aligner nos opinions sur celles du groupe.",icon:"👥",color:"#7C3AED",definition:"Le biais de conformité est notre tendance à modifier nos croyances, nos perceptions ou nos comportements pour les aligner sur ceux du groupe auquel nous appartenons ou voulons appartenir. Il peut conduire à des comportements contraires à notre jugement initial.",howItWorks:"Solomon Asch a démontré dans ses expériences classiques que des individus pouvaient affirmer des évidences fausses simplement parce que la majorité du groupe le faisait. La conformité opère par deux voies : l'influence normative (vouloir appartenir au groupe) et l'influence informationnelle (croire que le groupe a raison).",origin:"Les expériences de Asch (1951) et les travaux sur le « groupthink » développé par Irving Janis (1972) constituent la base fondamentale de ce domaine.",dailyExamples:["Rire à une blague qui ne nous amuse pas pour s'intégrer au groupe.","Voter pour le candidat que « tout le monde » soutient dans son entourage.","Adopter une tendance vestimentaire par peur d'être perçu comme décalé."],professionalExamples:["Dans une réunion, ne pas exprimer son désaccord car personne d'autre ne l'exprime.","Une équipe valide une décision risquée parce que le leader y croit fermement.","Des collaborateurs imitent les comportements d'un collègue populaire."],impacts:["Décisions de groupe de mauvaise qualité (groupthink).","Silence des lanceurs d'alerte potentiels.","Propagation de comportements contre-productifs dans les équipes."],misconceptions:["Idée reçue : « La conformité est toujours négative. » — Elle est souvent fonctionnelle. Elle devient problématique quand elle inhibe le jugement critique.","Idée reçue : « Les individus indépendants n'y sont pas soumis. » — Des études montrent que même les personnes non-conformistes y restent sensibles."],howToReduce:["Utiliser des techniques de vote anonyme avant les discussions de groupe.","Recueillir les avis individuels écrits avant toute délibération collective.","Nommer un « avocat du diable » dans les réunions de décision.","Valoriser explicitement les désaccords dans la culture d'équipe."],resources:["Asch, S. E. (1951). Effects of group pressure upon the modification and distortion of judgments. Carnegie Press.","Janis, I. L. (1972). Victims of Groupthink. Houghton Mifflin.","Cialdini, R. B. (1984). Influence. HarperCollins."],trainer:{objectives:["Expérimenter la pression de conformité dans un cadre sécurisé.","Distinguer conformité fonctionnelle et conformité problématique.","Développer des mécanismes de protection de la pensée divergente."],icebreakers:["Reproduire une version de l'expérience d'Asch : quelle ligne est la plus longue ?","Lever la main : « Qui pense que cette décision est risquée ? » puis révéler que la majorité l'a pensé sans le dire."],situations:["Simulation d'une réunion de crise où la décision majoritaire est sous-optimale.","Cas Columbia : comment la conformité a contribué à l'accident."],exercises:["Brainwriting : idées individuelles avant tout partage collectif.","Six chapeaux de De Bono pour structurer la divergence de pensée."],debrief:["Quand avez-vous senti la pression de vous conformer ?","Qu'est-ce qui vous aurait aidé à exprimer votre désaccord ?"],commonErrors:["Présenter la conformité comme systématiquement mauvaise."],facilitationTips:["S'assurer que chacun peut s'exprimer en évitant que certaines voix dominent.","Valoriser explicitement les opinions minoritaires."],debateQuestions:["Comment une organisation peut-elle favoriser le désaccord constructif ?","Le consensus est-il toujours la meilleure forme de décision collective ?"],reflectionPaths:["Dans mon équipe, qui exprime le plus souvent des opinions divergentes ?"],businessApplications:["Gouvernance : diversité des conseils d'administration.","Innovation : espaces de divergence créative protégés.","Sécurité : cultures où le signalement d'anomalies est valorisé."]}},{id:"optimism",name:"Biais d'optimisme",shortDef:"Tendance à surestimer les chances de succès et sous-estimer les risques.",icon:"🌟",color:"#F59E0B",definition:"Le biais d'optimisme est notre tendance à croire que nos chances de vivre des événements positifs sont supérieures à la moyenne, et que nos risques de vivre des événements négatifs sont inférieurs. Nous nous percevons comme plus susceptibles de réussir, d'être en bonne santé et de connaître le bonheur que nos semblables.",howItWorks:"Ce biais résulte de plusieurs mécanismes : l'illusion de contrôle, l'attribution causale asymétrique (succès → moi, échecs → circonstances) et la comparaison sociale biaisée. Kahneman a notamment décrit la « planification optimiste » qui conduit à sous-estimer délais et coûts des projets.",origin:"Étudié par Neil Weinstein dès 1980 dans le contexte de la santé. Daniel Kahneman l'a relié à la « planification fallacieuse » (planning fallacy) qui touche aussi bien les individus que les organisations.",dailyExamples:["Penser que son mariage ne finira pas par un divorce, contrairement à la moitié des autres.","Croire qu'on sera prêt pour un examen en 3 jours alors qu'il en faudrait 10.","Prévoir un trajet de 30 min sans anticiper les embouteillages."],professionalExamples:["Sous-estimer le budget et le délai d'un projet complexe (planning fallacy).","Surestimer les ventes prévisionnelles d'un nouveau produit.","Ignorer les signaux d'alerte d'un projet en difficulté en pensant que « ça va s'arranger »."],impacts:["Dépassements de budget et de délais chroniques dans les projets.","Prise de risques financiers sous-évalués.","Comportements de santé inadaptés."],misconceptions:["Idée reçue : « L'optimisme, c'est toujours une bonne chose. » — Un optimisme irréaliste conduit à de mauvaises décisions.","Idée reçue : « Les pessimistes prennent de meilleures décisions. » — Le pessimisme défensif peut aussi être contreproductif."],howToReduce:["Utiliser la « planification par référence de classe » : comparer son projet à des projets similaires passés.","Effectuer un pre-mortem : imaginer que le projet a échoué et identifier les causes possibles.","Solliciter des estimations indépendantes de personnes non investies."],resources:["Weinstein, N. D. (1980). Unrealistic optimism about future life events. Journal of Personality and Social Psychology, 39(5).","Kahneman, D., & Lovallo, D. (1993). Timid choices and bold forecasts. Management Science, 39(1).","Kahneman, D. (2011). Thinking, Fast and Slow."],trainer:{objectives:["Distinguer optimisme réaliste et biais d'optimisme irréaliste.","Identifier la planning fallacy dans les projets professionnels.","Introduire des méthodes de calibration des estimations."],icebreakers:["Demander à chacun d'estimer le temps pour compléter une tâche simple. Comparer aux durées réelles.","Sondage : « Pensez-vous être meilleur conducteur que la moyenne ? » — 70-80% répondent oui."],situations:["Cas de planning d'un projet IT qui a dépassé son budget de 200%.","Analyse d'un lancement produit avec des prévisions irréalistes."],exercises:["Pre-mortem collectif : simuler l'échec d'un projet actuel.","Comparaison systématique avec des projets similaires du passé."],debrief:["Vos estimations étaient-elles fondées sur des données ou sur un ressenti ?","Comment l'investissement émotionnel influence-t-il vos prévisions ?"],commonErrors:["Confondre biais d'optimisme et motivation positive.","Présenter le pessimisme comme l'antidote."],facilitationTips:["Utiliser des exemples d'échecs célèbres (Segway) pour illustrer.","Montrer que les meilleures équipes combinent optimisme et rigueur."],debateQuestions:["Un leader devrait-il afficher un optimisme sincère même s'il est risqué ?","Comment intégrer des garde-fous sans tuer l'esprit entrepreneurial ?"],reflectionPaths:["Quel projet en cours sous-estime ses risques ?"],businessApplications:["Gestion de projet : méthodes agiles avec révisions fréquentes.","Finance : modèles de sensibilité et scénarios pessimistes obligatoires.","Innovation : processus de validation rapide (fail fast)."]}},{id:"negativity",name:"Biais de négativité",shortDef:"Les expériences négatives ont plus de poids que les positives équivalentes.",icon:"⚡",color:"#6B7280",definition:"Le biais de négativité décrit notre tendance à accorder plus de poids aux expériences, aux informations et aux émotions négatives qu'aux positives de même intensité. Une critique a plus d'impact qu'un compliment, une perte est ressentie plus intensément qu'un gain équivalent.",howItWorks:"Ce biais a probablement une valeur adaptative : il était plus vital pour nos ancêtres de détecter les menaces que les opportunités. Notre cerveau consacre plus de ressources neurales au traitement des stimuli négatifs. Kahneman et Tversky ont montré que les pertes ont environ deux fois plus de poids que les gains équivalents.",origin:"Décrit formellement par Baumeister et al. (2001) dans leur article synthétique « Bad is Stronger than Good ». Il s'inscrit dans le cadre de l'aversion à la perte de Kahneman et Tversky.",dailyExamples:["Un commentaire négatif sur un exposé efface le souvenir de 10 positifs.","Une mauvaise nouvelle le matin affecte l'humeur de toute la journée.","On se souvient mieux des conflits que des moments harmonieux."],professionalExamples:["Un manager mémorise mieux les erreurs de ses collaborateurs que leurs succès.","La peur de l'échec freine la prise d'initiative dans les équipes.","Un mauvais avis client efface l'effet de 10 avis positifs sur la réputation perçue."],impacts:["Culture de la peur de l'erreur dans les organisations.","Sous-estimation du capital de confiance et des points forts.","Prise de décision trop conservatrice par aversion au risque."],misconceptions:["Idée reçue : « Ce biais est un défaut de caractère. » — C'est un mécanisme cognitif naturel.","Idée reçue : « Il suffit de positiver. » — La solution n'est pas de nier le négatif mais de le rééquilibrer consciemment."],howToReduce:["Pratiquer la reconnaissance des succès : tenir un journal de réussites.","Dans le management, systématiser les feedbacks positifs spécifiques.","Adopter la règle des 5:1 en management (Gottman) : 5 interactions positives pour 1 négative.","Recadrer les erreurs comme des apprentissages plutôt que des échecs."],resources:["Baumeister, R. F., et al. (2001). Bad is stronger than good. Review of General Psychology, 5(4), 323–370.","Kahneman, D., & Tversky, A. (1979). Prospect theory. Econometrica, 47(2), 263–291.","Gottman, J. M. (1994). What Predicts Divorce? Lawrence Erlbaum Associates."],trainer:{objectives:["Prendre conscience de l'asymétrie entre positif et négatif dans nos évaluations.","Développer des pratiques de management qui compensent ce biais.","Créer des cultures de l'apprentissage plutôt que de l'évitement."],icebreakers:["Demander à chacun de noter le dernier feedback reçu dont il se souvient le mieux.","Exercice : noter 3 choses qui se sont bien passées cette semaine."],situations:["Collaborateur qui reçoit 8 points positifs et 2 négatifs dans son entretien annuel. Que retient-il ?","Gestion d'un commentaire critique suite à un succès global."],exercises:["Analyse du ratio positif/négatif dans les emails managériaux.","Construction d'une grille de feedback SBI (Situation-Behavior-Impact)."],debrief:["Quel feedback vous a le plus affecté ? Était-il positif ou négatif ?","Comment gérez-vous votre biais de négativité dans votre style managérial ?"],commonErrors:["Conclure qu'il faut éviter tout feedback négatif.","Confondre biais de négativité et personnalité pessimiste."],facilitationTips:["Ouvrir l'atelier par un partage de succès pour contrebalancer le biais.","Éviter un ton trop académique."],debateQuestions:["Faut-il protéger les équipes du négatif ou les y exposer pour les renforcer ?","Comment construire une culture d'apprentissage qui transforme l'erreur en ressource ?"],reflectionPaths:["Quel est mon ratio positif/négatif dans ma communication managériale ?"],businessApplications:["Management : formations au feedback équilibré, culture de la reconnaissance.","Expérience client : gérer les avis négatifs avec une attention proportionnée.","Communication interne : équilibrer les communications de crise et de succès."]}},{id:"dunningkruger",name:"Effet Dunning-Kruger",shortDef:"Les moins compétents surestiment leurs compétences ; les experts les sous-estiment.",icon:"📊",color:"#DC2626",definition:"L'effet Dunning-Kruger est un biais cognitif par lequel des personnes peu compétentes dans un domaine tendent à surestimer leurs propres compétences, tandis que les personnes très compétentes ont tendance à sous-estimer les leurs. La compétence requise pour évaluer une performance est souvent la même que celle requise pour l'exécuter.",howItWorks:"Les débutants dans un domaine n'ont pas encore les connaissances nécessaires pour mesurer l'étendue de ce qu'ils ignorent. La conscience de ses lacunes est elle-même une forme de compétence. Note : des méta-analyses récentes (notamment Gignac & Zajenkowski, 2020) ont nuancé certaines interprétations méthodologiques de l'effet original.",origin:"Décrit par David Dunning et Justin Kruger en 1999 dans une étude sur l'humour, la grammaire et la logique. Leur article « Unskilled and Unaware of It » est devenu l'un des plus cités en psychologie sociale.",dailyExamples:["Un conducteur débutant se perçoit souvent comme meilleur que la moyenne.","Un expert en bricolage amateur qui se lance dans des travaux complexes sans conscience des risques.","Un novice en nutrition qui donne des conseils à des professionnels."],professionalExamples:["Un nouveau manager très sûr de lui dans un domaine qu'il commence tout juste à explorer.","Un débutant qui propose des solutions simples à des problèmes complexes.","Un expert qui hésite à prendre position car il perçoit clairement toutes les nuances."],impacts:["Prise de risques inconsidérés par des personnes peu compétentes mais très confiantes.","Expertise sous-valorisée des personnes les plus compétentes.","Difficultés dans les processus de recrutement et d'évaluation."],misconceptions:["Idée reçue : « Les experts ne surestiment jamais. » — L'effet implique aussi une sous-estimation de la part des experts.","Idée reçue : « Il suffit d'être intelligent pour y échapper. » — La formation métacognitive aide davantage que l'intelligence brute.","Note scientifique : certaines méthodologies originales ont été critiquées. L'effet existe mais son amplitude varie selon les contextes."],howToReduce:["Développer la pratique métacognitive : réfléchir régulièrement sur ce qu'on sait et ne sait pas.","Chercher des retours réguliers de personnes compétentes dans le domaine.","Adopter une posture d'apprenant permanent (growth mindset)."],resources:["Kruger, J., & Dunning, D. (1999). Unskilled and unaware of it. Journal of Personality and Social Psychology, 77(6), 1121–1134.","Dunning, D. (2011). The Dunning-Kruger effect. Advances in Experimental Social Psychology, 44.","Gignac, G. E., & Zajenkowski, M. (2020). The Dunning-Kruger effect is (mostly) a statistical artefact. Intelligence, 80."],trainer:{objectives:["Comprendre le cycle compétence/confiance.","Développer des pratiques de feedback et d'auto-évaluation plus fiables.","Identifier comment l'effet influence les dynamiques d'équipe."],icebreakers:["Demander à chacun de se noter sur 10 dans son domaine, puis de prédire comment ses pairs le noteraient.","Quizz rapide sur un domaine commun — observer qui était le plus confiant avant."],situations:["Un junior très confiant présente une solution complexe lors d'une réunion d'experts.","Un expert hésite trop dans une situation d'urgence."],exercises:["Cartographie de compétences individuelle avec évaluation croisée.","Présentation d'un sujet à des non-experts."],debrief:["Dans quel domaine vous sentez-vous le plus confiant ? Vos pairs partagent-ils cette évaluation ?","Quand avez-vous pris conscience d'une lacune importante ?"],commonErrors:["Utiliser l'effet pour disqualifier les opinions des moins expérimentés.","Présenter une courbe de Dunning-Kruger non validée scientifiquement."],facilitationTips:["Présenter les nuances scientifiques récentes.","Valoriser l'incertitude comme signe de maturité cognitive."],debateQuestions:["Comment encourager la prise d'initiative des débutants sans ignorer les risques ?","Quel est le rôle du feedback pour calibrer l'auto-perception ?"],reflectionPaths:["Dans quel domaine ma confiance est-elle peut-être excessive ?"],businessApplications:["Recrutement : évaluations de compétences objectives.","Management : cultures de feedback continu.","Formation : cycle incompétence inconsciente → compétence consciente."]}},{id:"framing",name:"Biais de cadrage",shortDef:"Notre décision change selon la façon dont l'information est présentée.",icon:"🖼️",color:"#0891B2",definition:"Le biais de cadrage (framing effect) décrit le phénomène par lequel nos décisions et nos jugements sont influencés par la façon dont une information est formulée, indépendamment de son contenu objectif. « 90% de survie » et « 10% de mortalité » représentent la même réalité mais suscitent des réactions très différentes.",howItWorks:"Kahneman et Tversky ont montré que les êtres humains ne réagissent pas à des valeurs absolues mais à des valeurs relatives à un point de référence. Le cadrage agit en établissant ce point de référence. Le contexte linguistique, émotionnel et visuel influence profondément notre interprétation.",origin:"Décrit formellement par Tversky et Kahneman (1981). La célèbre expérience du « problème asiatique de la maladie » a illustré que des personnes choisissaient différemment selon que les options étaient présentées en termes de vies sauvées ou de vies perdues.",dailyExamples:["« Yaourt contenant 10% de matières grasses » vs « 90% sans matières grasses ».","« Il reste 5 places disponibles » vs « 95 personnes ont déjà réservé ».","Un salaire présenté comme « 3 000€ par mois » vs « 36 000€ par an »."],professionalExamples:["Présenter une réduction de coûts comme un « investissement dans l'efficacité ».","Formuler une proposition commerciale en termes de gain plutôt que de coût.","Annoncer une restructuration comme une « transformation stratégique »."],impacts:["Décisions médicales différentes selon la formulation du risque.","Politiques publiques influencées par le cadrage médiatique.","Manipulation potentielle des parties prenantes via le langage."],misconceptions:["Idée reçue : « Le cadrage, c'est juste du marketing. » — Il influence des décisions médicales, juridiques et politiques sérieuses.","Idée reçue : « Connaître ce biais suffit à s'en protéger. » — Même les personnes informées restent influencées."],howToReduce:["Présenter systématiquement les informations dans plusieurs formats (positif et négatif).","Rechercher la formulation alternative de toute information importante.","Utiliser des données brutes (chiffres absolus) plutôt que des formulations relatives."],resources:["Tversky, A., & Kahneman, D. (1981). The framing of decisions and the psychology of choice. Science, 211(4481).","Levin, I. P., et al. (1998). All frames are not created equal. Organizational Behavior and Human Decision Processes, 76(2).","Kahneman, D. (2011). Thinking, Fast and Slow."],trainer:{objectives:["Expérimenter l'impact du cadrage sur les décisions.","Identifier les utilisations légitimes et manipulatrices du cadrage.","Développer un regard critique sur la formulation des informations."],icebreakers:["Reproduire le « problème asiatique de la maladie » dans un contexte professionnel.","Présenter le même budget : économies réalisées vs. dépenses restantes."],situations:["Cas : négociation d'un contrat — comment le cadrage influence-t-il le résultat ?","Analyse d'une communication de crise : quel cadrage a été choisi ?"],exercises:["Réécriture : reformuler 5 messages professionnels dans un cadrage opposé.","Analyse de discours : identifier le cadrage dans des communications réelles."],debrief:["Comment la formulation change-t-elle votre ressenti et votre décision ?","Dans quelles situations avez-vous utilisé ou subi un cadrage particulier ?"],commonErrors:["Conclure que tout cadrage est manipulation.","Confondre biais de cadrage et mensonge."],facilitationTips:["Aborder la dimension éthique du cadrage.","Utiliser des exemples publicitaires connus."],debateQuestions:["Y a-t-il une formulation « neutre » de l'information ?","Quand le cadrage devient-il manipulation ?"],reflectionPaths:["Comment je formule mes demandes et mes arguments professionnellement ?"],businessApplications:["Communication : former les équipes à des cadrages éthiques et efficaces.","Négociation : utiliser consciemment le cadrage.","Médecine / RH : communiquer les risques de façon complète."]}},{id:"hindsight",name:"Biais rétrospectif",shortDef:"Après un événement, on se croit plus capable de l'avoir prédit qu'on ne l'était.",icon:"🔮",color:"#7C3AED",definition:"Le biais rétrospectif (hindsight bias), souvent appelé « j'aurais dû le savoir », est notre tendance à percevoir des événements passés comme ayant été prévisibles, une fois qu'ils se sont produits. Ce biais distord notre mémoire des prédictions passées et réduit notre capacité à apprendre de nos erreurs.",howItWorks:"Une fois que nous connaissons le résultat d'un événement, notre cerveau réorganise rétrospectivement les informations disponibles pour créer une narrative cohérente. Cette reconstruction mémorielle est souvent inconsciente. Elle peut conduire à sanctionner injustement des décideurs qui ont fait des choix raisonnables avec l'information disponible.",origin:"Étudié par Baruch Fischhoff à partir de 1975, notamment dans le cadre des jugements a posteriori sur des événements historiques. Des travaux ultérieurs ont confirmé sa robustesse dans des domaines variés (médecine, droit, finance, sport).",dailyExamples:["« Je savais que cette relation n'allait pas marcher. » — mais on ne l'avait pas dit avant.","« C'était évident que ce candidat allait perdre. » — avec le recul.","Après un accident, penser qu'on aurait pu l'anticiper facilement."],professionalExamples:["Un manager critique une décision passée comme « évidemment mauvaise » alors qu'elle était raisonnable dans son contexte.","Un investisseur pense qu'il « savait » qu'une action allait chuter.","Un audit post-crise conclut que les signaux étaient « évidents »."],impacts:["Apprentissage organisationnel appauvri.","Jugements injustes sur des décideurs qui ont fait des choix raisonnables dans l'incertitude.","Excès de confiance dans nos capacités à prévoir le futur."],misconceptions:["Idée reçue : « C'est seulement de la fierté mal placée. » — Ce biais est inconscient et affecte la mémoire elle-même.","Idée reçue : « Il suffit d'être honnête avec soi-même. » — L'honnêteté ne protège pas contre la reconstruction mémorielle."],howToReduce:["Tenir un journal de décisions : noter ses prédictions avant les événements.","Utiliser le pre-mortem : anticiper les échecs avant qu'ils ne surviennent.","Dans les analyses post-événement, reconstituer le contexte informationnel initial.","Distinguer la qualité d'une décision de la qualité de son résultat."],resources:["Fischhoff, B. (1975). Hindsight ≠ foresight. Journal of Experimental Psychology: Human
