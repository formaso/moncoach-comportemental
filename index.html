<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Coach Comportemental — FormaSo</title>
  <meta name="description" content="Plateforme pédagogique FormaSo : Approche comportementale et Biais cognitifs. Sophie Sirgue, formatrice indépendante.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--vert:#2F4F3E;--vert2:#3A6250;--jaune:#E8B73A;--beige:#FAF7F2;--blanc:#FFFFFF;--texte:#2B2B2B;--gris:#8A8176;--bord:rgba(47,79,62,.12);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:Inter,sans-serif;background:var(--beige);overflow:hidden;}

    /* NAV */
    .hub-nav{position:fixed;top:0;left:0;right:0;z-index:9999;height:58px;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--bord);display:flex;align-items:center;padding:0 20px;gap:16px;box-shadow:0 1px 10px rgba(0,0,0,.06);}
    .hub-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;cursor:pointer;background:none;border:none;}
    .hub-logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(140deg,var(--vert),var(--vert2));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 8px rgba(47,79,62,.25);}
    .hub-brand-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:800;color:var(--vert);line-height:1.1;}
    .hub-brand-sub{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gris);}
    .hub-sep{width:1px;height:26px;background:var(--bord);flex-shrink:0;}
    .hub-tabs{display:flex;gap:4px;flex:1;}
    .hub-tab{display:flex;align-items:center;gap:7px;font-family:Inter,sans-serif;font-size:13px;font-weight:500;color:var(--gris);background:transparent;border:none;cursor:pointer;padding:7px 16px;border-radius:22px;transition:all .18s;}
    .hub-tab:hover{color:var(--vert);background:rgba(47,79,62,.07);}
    .hub-tab.active{color:var(--vert);background:rgba(47,79,62,.09);font-weight:600;}
    .t-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:10px;background:rgba(47,79,62,.1);color:var(--vert);transition:all .18s;}
    .hub-tab.active .t-badge{background:var(--jaune);color:var(--vert);}
    .hub-sig{margin-left:auto;flex-shrink:0;font-size:11px;color:var(--gris);white-space:nowrap;}
    .hub-sig strong{color:var(--vert);font-weight:600;}

    /* PANES */
    .pane{position:fixed;top:58px;left:0;right:0;bottom:0;display:none;overflow:hidden;}
    .pane.active{display:block;}
    .pane iframe{width:100%;height:100%;border:none;display:block;opacity:0;transition:opacity .3s;}
    .pane iframe.ready{opacity:1;}

    /* LOADER */
    .pane-loader{position:absolute;inset:0;background:var(--beige);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .35s;}
    .pane-loader.hidden{opacity:0;pointer-events:none;}
    .loader-icon{font-size:36px;}
    .loader-label{font-size:14px;color:var(--gris);}
    .loader-dots{display:flex;gap:8px;}
    .loader-dot{width:9px;height:9px;border-radius:50%;background:var(--vert);opacity:.25;animation:ldot 1.3s ease-in-out infinite;}
    .loader-dot:nth-child(2){animation-delay:.15s;}
    .loader-dot:nth-child(3){animation-delay:.30s;}
    @keyframes ldot{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:.9;transform:scale(1.15);}}

    /* SPLASH */
    #splash{position:fixed;inset:0;z-index:8888;background:var(--beige);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity .5s;}
    #splash.hidden{opacity:0;pointer-events:none;}
    .sp-logo{width:68px;height:68px;border-radius:18px;background:linear-gradient(140deg,var(--vert),var(--vert2));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 6px 24px rgba(47,79,62,.28);}
    .sp-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:var(--vert);text-align:center;line-height:1.15;}
    .sp-sub{font-size:15px;color:var(--gris);text-align:center;}
    .sp-modules{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
    .sp-mod{padding:14px 28px;border-radius:30px;font-family:Inter,sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;gap:9px;}
    .sp-mod:hover{transform:translateY(-2px);}
    .sp-mod-disc{background:var(--vert);color:var(--blanc);box-shadow:0 4px 14px rgba(47,79,62,.28);}
    .sp-mod-disc:hover{background:var(--vert2);}
    .sp-mod-biais{background:var(--jaune);color:var(--vert);box-shadow:0 4px 14px rgba(232,183,58,.32);}
    .sp-mod-biais:hover{filter:brightness(1.05);}
    .sp-footer{font-size:11px;color:var(--gris);}

    @media(max-width:640px){.hub-sig{display:none;}.hub-tab{padding:6px 10px;}.t-badge{display:none;}.hub-brand-name{font-size:12px;}}
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-logo">🧠</div>
  <div class="sp-title">Mon Coach<br>Comportemental</div>
  <div class="sp-sub">Choisissez votre module de travail</div>
  <div class="sp-modules">
    <button class="sp-mod sp-mod-disc" onclick="launch('disc')">🎯 Approche comportementale</button>
    <button class="sp-mod sp-mod-biais" onclick="launch('biais')">🧠 Biais cognitifs</button>
  </div>
  <div class="sp-footer">FormaSo · Sophie Sirgue, formatrice indépendante</div>
</div>

<!-- NAV HUB -->
<nav class="hub-nav">
  <button class="hub-brand" onclick="goHome()">
    <div class="hub-logo">🧠</div>
    <div>
      <div class="hub-brand-name">Mon Coach Comportemental</div>
      <div class="hub-brand-sub">Une application FormaSo</div>
    </div>
  </button>
  <div class="hub-sep"></div>
  <div class="hub-tabs">
    <button class="hub-tab" id="tab-disc" onclick="showTab('disc')">
      🎯 Approche comportementale <span class="t-badge">DISC</span>
    </button>
    <button class="hub-tab" id="tab-biais" onclick="showTab('biais')">
      🧠 Biais cognitifs <span class="t-badge">Diagnostic</span>
    </button>
  </div>
  <span class="hub-sig">FormaSo · <strong>Sophie Sirgue</strong></span>
</nav>

<!-- PANE DISC -->
<div class="pane" id="pane-disc">
  <div class="pane-loader" id="loader-disc">
    <div class="loader-icon">🎯</div>
    <div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
    <div class="loader-label">Chargement de l'approche comportementale…</div>
  </div>
  <iframe id="frame-disc" src="disc.html" title="Module approche comportementale" onload="onLoad('disc')"></iframe>
</div>

<!-- PANE BIAIS -->
<div class="pane" id="pane-biais">
  <div class="pane-loader" id="loader-biais">
    <div class="loader-icon">🧠</div>
    <div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
    <div class="loader-label">Chargement du module biais cognitifs…</div>
  </div>
  <iframe id="frame-biais" src="biais.html?embed=1" title="Module biais cognitifs" onload="onLoad('biais')"></iframe>
</div>

<script>
const TABS=['disc','biais'];

function launch(name){
  const sp=document.getElementById('splash');
  sp.classList.add('hidden');
  showTab(name);
  setTimeout(()=>{sp.style.display='none';},550);
}

function goHome(){
  TABS.forEach(t=>{
    document.getElementById('pane-'+t).classList.remove('active');
    document.getElementById('tab-'+t).classList.remove('active');
  });
  const sp=document.getElementById('splash');
  sp.style.display='flex';
  requestAnimationFrame(()=>sp.classList.remove('hidden'));
}

function showTab(name){
  TABS.forEach(t=>{
    document.getElementById('pane-'+t).classList.toggle('active',t===name);
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
  });
}

function onLoad(name){
  document.getElementById('loader-'+name).classList.add('hidden');
  const frame=document.getElementById('frame-'+name);
  frame.classList.add('ready');
  // Masquer la nav interne (same-origin)
  try{
    const fdoc=frame.contentDocument||frame.contentWindow.document;
    if(!fdoc)return;
    if(fdoc.getElementById('hub-embed-override'))return;
    const s=fdoc.createElement('style');
    s.id='hub-embed-override';
    s.textContent='#main-nav,.nav,nav.nav{display:none!important;}';
    fdoc.head.appendChild(s);
  }catch(e){}
}
</script>
</body>
</html>
